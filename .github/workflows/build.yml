name: Build SubServer Binary
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # 关键：一个架构失败不终止另一个
      matrix:
        target:
          - linux-x64
          - linux-arm64
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 安装 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # 移除cache，不再要求package-lock.json

      - name: 切换国内npm源 + pkg镜像
        run: |
          npm config set registry https://registry.npmmirror.com
          echo "PKG_GITHUB_MIRROR=https://registry.npmmirror.com/binary-host" >> $GITHUB_ENV

      - name: 安装项目依赖
        run: npm install --no-save

      - name: 全局安装pkg打包工具
        run: npm install -g pkg

      - name: 打包对应架构二进制
        run: |
          pkg -t ${{ matrix.target }} index.js -o subserver-${{ matrix.target }}
          chmod +x subserver-${{ matrix.target }}
          ls -lh subserver-${{ matrix.target }}

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: subserver-${{ matrix.target }}
          path: subserver-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 下载全部构建文件
        uses: actions/download-artifact@v4
        with:
          path: out/
      - name: 整理文件
        run: mv out/*/* ./
      - name: 生成版本tag
        run: echo "TAG=build-${{ github.sha }}" >> $GITHUB_ENV
      - name: 发布Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          files: |
            subserver-linux-x64
            subserver-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
