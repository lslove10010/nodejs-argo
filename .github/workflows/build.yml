name: Build SubServer Binary

# 触发条件：push main分支 / 手动触发
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - linux-x64
          - linux-arm64
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 配置国内镜像加速
        run: |
          npm config set registry https://registry.npmmirror.com
          echo "PKG_GITHUB_MIRROR=https://registry.npmmirror.com/binary-host" >> $GITHUB_ENV
          echo "PKG_CACHE_PATH=./.pkg-cache" >> $GITHUB_ENV

      - name: 安装依赖
        run: npm install

      - name: 全局安装 pkg
        run: npm install pkg -g

      - name: 打包对应架构二进制
        run: |
          pkg -t ${{ matrix.target }} index.js -o subserver-${{ matrix.target }}
          chmod +x subserver-${{ matrix.target }}

      - name: 上传产物到工作流
        uses: actions/upload-artifact@v4
        with:
          name: subserver-${{ matrix.target }}
          path: subserver-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 下载全部打包文件
        uses: actions/download-artifact@v4
        with:
          path: ./release-files

      - name: 合并文件到根目录
        run: mv ./release-files/*/* ./

      - name: 获取版本号（用短commit hash作为版本）
        id: getver
        run: echo "VERSION=build-${{ github.sha }}" >> $GITHUB_ENV

      - name: 创建 Release 并上传二进制
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Build ${{ env.VERSION }}
          files: |
            subserver-linux-x64
            subserver-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
