name: Build Sub Binary
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - linux-x64
          - linux-arm64
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Config npm & pkg mirror
        run: |
          npm config set registry https://registry.npmmirror.com
          mkdir -p ./.pkg-cache
          echo "PKG_CACHE_PATH=$PWD/.pkg-cache" >> $GITHUB_ENV
          echo "PKG_GITHUB_MIRROR=https://registry.npmmirror.com/binary-host" >> $GITHUB_ENV
          echo "NPM_CONFIG_LOGLEVEL=verbose" >> $GITHUB_ENV

      - name: Print file list (debug)
        run: ls -la

      - name: Install dependencies
        run: |
          npm install --no-save
          echo "===== npm install finished ====="

      - name: Global install pkg
        run: |
          npm install -g pkg
          pkg --version

      - name: Build ${{ matrix.arch }}
        run: |
          set -e
          pkg -t ${{ matrix.arch }} index.js -o subserver-${{ matrix.arch }}
          chmod +x subserver-${{ matrix.arch }}
          ls -lh subserver-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: subserver-${{ matrix.arch }}
          path: subserver-${{ matrix.arch }}
